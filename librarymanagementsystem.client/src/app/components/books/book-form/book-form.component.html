<div class="form-page">
  <h1>{{ isEdit ? 'Edit Book' : 'Add New Book' }}</h1>

  <div class="alert alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>

  <form (ngSubmit)="save()" #bookForm="ngForm" class="form-card">
    <div class="form-group">
      <label for="title">Title *</label>
      <input id="title" type="text" [(ngModel)]="model.title" name="title" required maxlength="200" />
    </div>

    <div class="form-group">
      <label for="author">Author *</label>
      <input id="author" type="text" [(ngModel)]="model.author" name="author" required maxlength="150" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="isbn">ISBN *</label>
        <input id="isbn" type="text" [(ngModel)]="model.isbn" name="isbn" required maxlength="20" />
      </div>
      <div class="form-group">
        <label for="genre">Genre</label>
        <input id="genre" type="text" [(ngModel)]="model.genre" name="genre" maxlength="100" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="year">Published Year</label>
        <input id="year" type="number" [(ngModel)]="model.publishedYear" name="publishedYear" min="1000" max="2100" />
      </div>
      <div class="form-group">
        <label for="copies">Total Copies</label>
        <input id="copies" type="number" [(ngModel)]="model.totalCopies" name="totalCopies" min="1" max="100" />
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="!bookForm.valid">{{ isEdit ? 'Update' : 'Add Book' }}</button>
      <a routerLink="/books" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
